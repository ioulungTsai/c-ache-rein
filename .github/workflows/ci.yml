name: Build All Exercises

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install build tools
      run: sudo apt-get install -y gcc make

    - name: Build all exercises
      run: |
        find . -name "Makefile" | while read makefile; do
          dir=$(dirname "$makefile")
          echo "Building: $dir"
          make -C "$dir" || exit 1
        done
